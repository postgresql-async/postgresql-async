name: build

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PGUSER: postgres
      PG_HOST: 127.0.0.1
      GITHUB_ACTIONS: true
    services:
      postgres:
        image: postgres:10
        ports:
          - 5432:5432
        volumes:
          - ${{ github.workspace }}:/github/workspace
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ''
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:5.7
        ports:
          - 3306:3306
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
     matrix:
       scala: [2.12.20, 2.13.18, 3.3.7]
    timeout-minutes: 10
    steps:
      - name: Clone Repository
        uses: actions/checkout@v6

      - name: Set up java
        uses: actions/setup-java@v5
        with:
          java-version: 8
          distribution: 'zulu'
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Configure PostgreSQL service
        run: |
          postgres_container="${{ job.services.postgres.id }}"
          sed 's/127.0.0.1\/32/0.0.0.0\/0/g' build/server/conf/pg_hba.conf > build/server/conf/pg_hba_actions.conf
          sudo install -m 644 -o root -g root build/server/cert/server.crt build/server/cert/server_actions.crt
          sudo install -m 600 -o root -g root build/server/cert/server.key build/server/cert/server_actions.key
          docker exec -u root "${postgres_container}" sh -c "chown postgres:postgres /github/workspace/build/server/cert/server_actions.crt /github/workspace/build/server/cert/server_actions.key && chmod 600 /github/workspace/build/server/cert/server_actions.key"
          docker exec -u root "${postgres_container}" sh -c "printf '\nhba_file = '\''/github/workspace/build/server/conf/pg_hba_actions.conf'\''\nssl = on\nssl_cert_file = '\''/github/workspace/build/server/cert/server_actions.crt'\''\nssl_key_file = '\''/github/workspace/build/server/cert/server_actions.key'\''\n' >> /var/lib/postgresql/data/postgresql.conf"
          docker restart "${postgres_container}"
          for _ in {1..30}; do
            if docker exec "${postgres_container}" pg_isready -U postgres -d postgres; then
              exit 0
            fi
            if [ "$(docker inspect -f '{{.State.Running}}' "${postgres_container}")" != "true" ]; then
              docker logs "${postgres_container}"
              exit 1
            fi
            sleep 1
          done
          docker logs "${postgres_container}"
          exit 1

      - name: Setup database
        run: bash build/prepare_build.sh

      - name: Tests
        run: sbt ++${{matrix.scala}} test
        if: ${{ !startsWith(matrix.scala, '2.13') }}

      - name: Tests with Coverage
        run: sbt ++${{matrix.scala}} coverage test coverageAggregate
        if: ${{ startsWith(matrix.scala, '2.13') }}

      - name: Upload codecov
        if: ${{ startsWith(matrix.scala, '2.13') }}
        uses: codecov/codecov-action@v1
